<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ottawa Rec Dashboard (Pages)</title>
<style>body{font-family:Inter,system-ui,sans-serif;margin:20px;background:#1f0124;color:#fff} .muted{color:#cdb9d4} iframe{width:100%;height:80vh;border:1px solid #ffffff33;border-radius:12px;background:#fff}</style>
</head><body>
<h2>Ottawa Rec Dashboard Client</h2>
<p class="muted">This embeds your backend UI. Configure <code>window.API_BASE_URL</code> in <code>config.js</code> first.</p>
<div id="error" class="muted"></div>
<iframe id="uiFrame" title="Ottawa Rec UI"></iframe>
<script src="config.js"></script>
<script>
  const base = (window.API_BASE_URL || '').replace(/\/$/, '');
  const frame = document.getElementById('uiFrame');
  const err = document.getElementById('error');
  if (!base) {
    err.textContent = 'Missing API_BASE_URL in docs/config.js';
  } else {
    frame.src = `${base}/login`;
  }
</script>
</body></html>
