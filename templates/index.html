<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ottawa Rec Booking</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; margin:0; background:#0b1220; color:#e5e7eb; }
    .wrap { max-width:1100px; margin:0 auto; padding:16px; }
    h1 { margin:0 0 12px; }
    .panel { background:#111827; border:1px solid #334155; border-radius:12px; padding:14px; margin-bottom:14px; }
    .row { display:flex; gap:8px; flex-wrap:wrap; }
    input, select, button { padding:10px; border-radius:8px; border:1px solid #334155; background:#0f172a; color:#e5e7eb; }
    button { cursor:pointer; }
    .primary { background:#2563eb; border:none; }
    .danger { background:#dc2626; border:none; }
    table { width:100%; border-collapse:collapse; }
    th,td { padding:10px; border-bottom:1px solid #1f2937; text-align:left; vertical-align:top; }
    .slot { font-size:12px; color:#93c5fd; margin:2px 0; }
    @media (max-width: 800px) {
      table, thead, tbody, tr, td, th { display:block; }
      thead { display:none; }
      tr { border:1px solid #334155; border-radius:10px; margin-bottom:10px; padding:10px; }
      td { border:none; padding:6px 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Ottawa Rec Booking</h1>

    <div class="panel">
      <h3>Telegram Recipients</h3>
      <div class="row">
        <input id="phoneNumbers" placeholder="Phone numbers (comma separated)" style="flex:2" />
        <input id="chatIds" placeholder="Telegram chat IDs (comma separated)" style="flex:2" />
        <button class="primary" onclick="saveRecipients()">Save</button>
      </div>
    </div>

    <div class="panel">
      <h3>Add Sport</h3>
      <div class="row">
        <input id="sportId" placeholder="sport id (e.g. volleyball)" />
        <input id="sportName" placeholder="Sport display name" />
        <label><input type="checkbox" id="sportGroup" checked /> Group size required</label>
        <button class="primary" onclick="addSport()">Add Sport</button>
      </div>
    </div>

    <div class="panel">
      <table>
        <thead><tr><th>Sport</th><th>Center</th><th>Group</th><th>Actions</th><th>Status</th><th>Details</th></tr></thead>
        <tbody id="sportsTable"></tbody>
      </table>
    </div>
  </div>

<script>
let sports = [];
let centers = [];
const monitoring = {};

function key(sportId, center){ return `${center}:${sportId}`; }

function render() {
  const tbody = document.getElementById('sportsTable');
  tbody.innerHTML = sports.map(s => `
    <tr id="row-${s.id}">
      <td>${s.name}<div style="font-size:12px;color:#94a3b8">${s.id}</div></td>
      <td><select id="center-${s.id}">${centers.map(c => `<option value="${c}">${c}</option>`).join('')}</select></td>
      <td>${s.groupSizeRequired ? `<input id="group-${s.id}" type="number" min="1" max="10" value="2" style="width:80px"/>` : '-'}</td>
      <td>
        <div class="row">
          <button class="primary" onclick="startMonitoring('${s.id}')">Start</button>
          <button class="danger" onclick="stopMonitoring('${s.id}')">Stop</button>
          <button onclick="checkNow('${s.id}')">Check</button>
        </div>
      </td>
      <td id="status-${s.id}">Idle</td>
      <td id="details-${s.id}">No data</td>
    </tr>`).join('');
}

async function loadConfig() {
  const res = await fetch('/api/config');
  if (res.status === 401) { window.location = '/login'; return; }
  const data = await res.json();
  sports = data.sports || [];
  centers = data.centers || ['cardelrec'];
  document.getElementById('phoneNumbers').value = (data.telegram_phone_numbers || []).join(',');
  document.getElementById('chatIds').value = (data.telegram_chat_ids || []).join(',');
  render();
}

async function saveRecipients() {
  const phoneNumbers = document.getElementById('phoneNumbers').value.split(',').map(s => s.trim()).filter(Boolean);
  const chatIds = document.getElementById('chatIds').value.split(',').map(s => s.trim()).filter(Boolean);
  await fetch('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({telegram_phone_numbers: phoneNumbers, telegram_chat_ids: chatIds})});
  alert('Recipient configuration saved');
}

async function addSport() {
  const id = document.getElementById('sportId').value.trim();
  const name = document.getElementById('sportName').value.trim();
  const groupSizeRequired = document.getElementById('sportGroup').checked;
  const res = await fetch('/api/sports', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id, name, groupSizeRequired})});
  const data = await res.json();
  if (!data.success) return alert(data.message || 'Failed to add sport');
  sports = data.sports;
  render();
}

function selectedCenter(sportId){ return document.getElementById(`center-${sportId}`).value; }
function selectedGroup(sportId){ const i=document.getElementById(`group-${sportId}`); return i?parseInt(i.value||'2'):2; }

async function startMonitoring(sportId){
  const center = selectedCenter(sportId);
  const group_size = selectedGroup(sportId);
  const res = await fetch('/api/start',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({activity_type:sportId, center, group_size})});
  const data = await res.json();
  if(!data.success) return alert(data.message || 'Start failed');
  document.getElementById(`status-${sportId}`).textContent = `Monitoring (${center})`;
}

async function stopMonitoring(sportId){
  const center = selectedCenter(sportId);
  const res = await fetch('/api/stop',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({activity_type:sportId, center})});
  const data = await res.json();
  if(!data.success) return alert(data.message || 'Stop failed');
  document.getElementById(`status-${sportId}`).textContent = 'Stopped';
}

async function checkNow(sportId){
  const center = selectedCenter(sportId);
  const group_size = selectedGroup(sportId);
  const res = await fetch('/api/check-now',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({activity_type:sportId, center, group_size})});
  const data = await res.json();
  const detail = document.getElementById(`details-${sportId}`);
  if(!data.success) { detail.textContent = data.message || 'Failed'; return; }
  const slots = data.slots || [];
  detail.innerHTML = slots.length ? slots.map(s => `<div class='slot'>${s.full_datetime || `${s.date||''} ${s.time||''}`}</div>`).join('') : 'No slots';
}

async function updateStatus(){
  const res = await fetch('/api/status');
  if(res.status!==200) return;
  const data = await res.json();
  Object.entries(data.processes || {}).forEach(([k,p]) => { monitoring[k]=p; });
  sports.forEach(s => {
    const center = selectedCenter(s.id);
    const st = monitoring[key(s.id, center)];
    if(!st) return;
    document.getElementById(`status-${s.id}`).textContent = st.active ? `Monitoring (${center})` : 'Idle';
    const detail = document.getElementById(`details-${s.id}`);
    if (st.slots && st.slots.length) {
      detail.innerHTML = st.slots.map(sl => `<div class='slot'>${sl.full_datetime || `${sl.date||''} ${sl.time||''}`}</div>`).join('');
    }
  });
}

loadConfig();
setInterval(updateStatus, 4000);
</script>
</body>
</html>
