<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ottawa Rec Booking</title>
  <style>
    body { margin:0; font-family: Inter, system-ui, sans-serif; min-height:100vh; display:grid; place-items:center; color:#fff;
      background: linear-gradient(135deg,#2a0130,#37003c,#5b0a67); }
    .card { width:min(760px,92vw); background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.22); border-radius:16px; padding:24px; }
    h1{margin:0 0 8px; font-size:2rem;} p{color:#e9d7ef; line-height:1.5}
    .row{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px}
    a{display:inline-block; color:#fff; text-decoration:none; padding:10px 14px; border-radius:10px; font-weight:700}
    .primary{background:#ff2a6d}.secondary{background:#4f22c5}
    code{background:rgba(0,0,0,.28); padding:2px 6px; border-radius:6px}
  </style>
</head>
<body>
  <main class="card">
    <h1>Ottawa Rec Booking</h1>
    <p>This GitHub Pages site hosts the static front-end landing experience. The actual booking app APIs require a live Flask backend.</p>
    <p>Set your backend URL in <code>docs/config.js</code> as <code>window.API_BASE_URL</code>, then open <code>app.html</code> for the dashboard client.</p>
    <div class="row">
      <a class="primary" href="app.html">Open Dashboard Client</a>
      <a class="secondary" href="https://github.com">Repository</a>
    </div>
  </main>
</body>
</html>
