<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ottawa Rec Booking</title>
  <style>
    :root {
      --pl-purple: #37003c;
      --pl-purple-2: #5b0a67;
      --pl-cyan: #00f0ff;
      --pl-pink: #ff2a6d;
      --pl-green: #00ff9f;
      --ink: #ffffff;
      --muted: #cdb9d4;
      --panel: rgba(33, 5, 48, 0.75);
      --border: rgba(255, 255, 255, 0.14);
      --shadow: 0 22px 60px rgba(9, 0, 18, 0.55);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(1000px 500px at 10% -5%, rgba(0, 240, 255, 0.24), transparent 60%),
        radial-gradient(900px 520px at 90% 110%, rgba(255, 42, 109, 0.22), transparent 65%),
        linear-gradient(135deg, #1f0124 0%, var(--pl-purple) 34%, var(--pl-purple-2) 100%);
    }

    .page {
      max-width: 1260px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background:
        linear-gradient(110deg, rgba(0, 240, 255, .12), rgba(255, 42, 109, .1)),
        rgba(48, 8, 64, .8);
      box-shadow: var(--shadow);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
    }

    .brand h1 {
      margin: 0;
      font-weight: 900;
      font-size: clamp(1.35rem, 3vw, 2rem);
      letter-spacing: .4px;
      text-transform: uppercase;
      text-shadow: 0 0 24px rgba(0, 240, 255, .24);
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: .95rem;
    }

    .btn {
      border: none;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      padding: 10px 14px;
      transition: transform .16s ease, box-shadow .2s ease, filter .2s ease;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
    .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .btn-primary { background: linear-gradient(130deg, #4f22c5, #7a2fff); box-shadow: 0 10px 24px rgba(122, 47, 255, .32); }
    .btn-success { background: linear-gradient(130deg, #00ae6b, var(--pl-green)); color: #102c23; box-shadow: 0 10px 24px rgba(0, 255, 159, .28); }
    .btn-danger { background: linear-gradient(130deg, #d01f5a, var(--pl-pink)); box-shadow: 0 10px 24px rgba(255, 42, 109, .28); }
    .btn-ghost { background: linear-gradient(130deg, rgba(255,255,255,.2), rgba(255,255,255,.08)); border: 1px solid rgba(255,255,255,.22); }

    .kpi {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .kpi-card {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 14px;
      padding: 10px 12px;
      box-shadow: var(--shadow);
    }

    .kpi-label { color: var(--muted); font-size: .8rem; text-transform: uppercase; letter-spacing: .5px; }
    .kpi-value { font-size: 1.1rem; font-weight: 800; margin-top: 4px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel {
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      padding: 14px;
    }

    .panel h3 { margin: 0 0 10px; font-size: 1rem; font-weight: 800; }

    .row { display: flex; gap: 8px; flex-wrap: wrap; }

    .field, .select, .number {
      flex: 1;
      min-width: 160px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      padding: 10px 11px;
      outline: none;
    }
    .field::placeholder { color: rgba(255,255,255,.68); }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.08);
      color: #fff;
      padding: 10px 12px;
      font-size: .92rem;
    }

    .table-panel { border-radius: 18px; overflow: hidden; }
    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; min-width: 960px; }

    th {
      padding: 12px;
      text-align: left;
      text-transform: uppercase;
      letter-spacing: .55px;
      font-size: .78rem;
      color: #fff;
      background: linear-gradient(130deg, rgba(0,240,255,.16), rgba(255,42,109,.17));
      border-bottom: 1px solid rgba(255,255,255,.2);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,.12);
      vertical-align: top;
      font-size: .92rem;
    }

    tr:hover td { background: rgba(255,255,255,.06); }

    .sport-name { font-weight: 800; }
    .sport-id { font-size: .75rem; color: var(--muted); margin-top: 2px; }

    .actions { display: flex; flex-wrap: wrap; gap: 7px; }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: .79rem;
      font-weight: 800;
      letter-spacing: .2px;
    }
    .status-idle { background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.22); color: #fff; }
    .status-active { background: rgba(0,255,159,.18); border: 1px solid rgba(0,255,159,.33); color: #c9ffe8; }
    .status-stop { background: rgba(255,42,109,.2); border: 1px solid rgba(255,42,109,.35); color: #ffd6e5; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

    .slots { display: flex; flex-direction: column; gap: 6px; }
    .slot {
      border: 1px solid rgba(255,255,255,.19);
      background: rgba(255,255,255,.08);
      border-radius: 10px;
      padding: 7px 9px;
      font-size: .84rem;
    }

    .muted { color: var(--muted); }

    .toast-stack {
      position: fixed;
      right: 12px;
      bottom: 12px;
      max-width: min(420px, calc(100vw - 24px));
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 999;
    }

    .toast {
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.2);
      padding: 10px 12px;
      font-size: .9rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      color: #fff;
    }
    .toast-success { background: rgba(0, 172, 104, .85); }
    .toast-error { background: rgba(182, 25, 80, .9); }
    .toast-info { background: rgba(69, 31, 118, .9); }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .kpi { grid-template-columns: 1fr; }
      .hero { flex-direction: column; align-items: flex-start; }
    }

    @media (max-width: 720px) {
      .page { padding: 14px; }
      table, thead, tbody, th, tr, td { display: block; }
      table { min-width: 0; }
      thead { display: none; }
      tr {
        border: 1px solid rgba(255,255,255,.18);
        border-radius: 14px;
        margin-bottom: 10px;
        background: rgba(255,255,255,.06);
      }
      td { border: none; padding: 9px 10px; }
      td::before {
        content: attr(data-label);
        display: block;
        font-size: .72rem;
        color: var(--muted);
        letter-spacing: .45px;
        text-transform: uppercase;
        margin-bottom: 3px;
      }
      .field, .select, .number { min-width: 100%; }
      .actions .btn { flex: 1; min-width: 92px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="brand">
        <h1>Premier Ottawa Rec Booking</h1>
        <p>Elite control center for sports slots, telegram notifications, and multi-center monitoring.</p>
      </div>
      <button class="btn btn-ghost" onclick="logout()">Logout</button>
    </section>

    <section class="kpi">
      <div class="kpi-card">
        <div class="kpi-label">Configured Sports</div>
        <div class="kpi-value" id="kpiSports">0</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Tracked Centers</div>
        <div class="kpi-value" id="kpiCenters">0</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Active Monitors</div>
        <div class="kpi-value" id="kpiActive">0</div>
      </div>
    </section>

    <section class="grid">
      <div class="panel">
        <h3>Telegram Recipients</h3>
        <div class="row">
          <input id="phoneNumbers" class="field" placeholder="Phone numbers (comma separated)" />
          <input id="chatIds" class="field" placeholder="Telegram chat IDs (comma separated)" />
          <button class="btn btn-success" onclick="saveRecipients()">Save</button>
        </div>
      </div>

      <div class="panel">
        <h3>Add Sport</h3>
        <div class="row">
          <input id="sportId" class="field" placeholder="sport id (e.g. volleyball)" />
          <input id="sportName" class="field" placeholder="Sport display name" />
          <label class="toggle"><input type="checkbox" id="sportGroup" checked /> Group size required</label>
          <button class="btn btn-primary" onclick="addSport()">Add Sport</button>
        </div>
      </div>
    </section>

    <section class="panel table-panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Sport</th>
              <th>Center</th>
              <th>Group Size</th>
              <th>Actions</th>
              <th>Status</th>
              <th>Latest Slots</th>
            </tr>
          </thead>
          <tbody id="sportsTable"></tbody>
        </table>
      </div>
    </section>
  </div>

  <div id="toastStack" class="toast-stack"></div>

<script>
let sports = [];
let centers = [];
const monitoring = {};

function key(sportId, center){ return `${center}:${sportId}`; }

function showToast(message, kind='info') {
  const stack = document.getElementById('toastStack');
  const toast = document.createElement('div');
  toast.className = `toast toast-${kind}`;
  toast.textContent = message;
  stack.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateY(8px)';
    setTimeout(() => toast.remove(), 200);
  }, 2600);
}

function statusPill(text, cls) {
  return `<span class="status-pill ${cls}"><span class="dot"></span>${text}</span>`;
}

function updateKpis() {
  document.getElementById('kpiSports').textContent = String(sports.length);
  document.getElementById('kpiCenters').textContent = String(centers.length);
  const active = Object.values(monitoring).filter(x => x && x.active).length;
  document.getElementById('kpiActive').textContent = String(active);
}

function render() {
  const tbody = document.getElementById('sportsTable');
  tbody.innerHTML = sports.map(s => `
    <tr id="row-${s.id}">
      <td data-label="Sport">
        <div class="sport-name">${s.name}</div>
        <div class="sport-id">${s.id}</div>
      </td>
      <td data-label="Center">
        <select id="center-${s.id}" class="select">${centers.map(c => `<option value="${c}">${c}</option>`).join('')}</select>
      </td>
      <td data-label="Group Size">
        ${s.groupSizeRequired ? `<input id="group-${s.id}" class="number" type="number" min="1" max="10" value="2" />` : '<span class="muted">Not required</span>'}
      </td>
      <td data-label="Actions">
        <div class="actions">
          <button class="btn btn-success" onclick="startMonitoring('${s.id}')">Start</button>
          <button class="btn btn-danger" onclick="stopMonitoring('${s.id}')">Stop</button>
          <button class="btn btn-primary" onclick="checkNow('${s.id}')">Check Now</button>
        </div>
      </td>
      <td data-label="Status" id="status-${s.id}">${statusPill('Idle', 'status-idle')}</td>
      <td data-label="Latest Slots" id="details-${s.id}"><span class="muted">No data yet</span></td>
    </tr>`).join('');
  updateKpis();
}

async function logout() {
  await fetch('/logout', { method: 'POST' });
  window.location = '/login';
}

async function loadConfig() {
  const res = await fetch('/api/config');
  if (res.status === 401) { window.location = '/login'; return; }
  const data = await res.json();
  sports = data.sports || [];
  centers = data.centers || ['cardelrec'];
  document.getElementById('phoneNumbers').value = (data.telegram_phone_numbers || []).join(',');
  document.getElementById('chatIds').value = (data.telegram_chat_ids || []).join(',');
  render();
}

async function saveRecipients() {
  const phoneNumbers = document.getElementById('phoneNumbers').value.split(',').map(s => s.trim()).filter(Boolean);
  const chatIds = document.getElementById('chatIds').value.split(',').map(s => s.trim()).filter(Boolean);
  const res = await fetch('/api/config', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({telegram_phone_numbers: phoneNumbers, telegram_chat_ids: chatIds})
  });
  if (!res.ok) {
    showToast('Failed to save recipients', 'error');
    return;
  }
  showToast('Recipients updated', 'success');
}

async function addSport() {
  const id = document.getElementById('sportId').value.trim();
  const name = document.getElementById('sportName').value.trim();
  const groupSizeRequired = document.getElementById('sportGroup').checked;
  const res = await fetch('/api/sports', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id, name, groupSizeRequired})
  });
  const data = await res.json();
  if (!data.success) {
    showToast(data.message || 'Failed to add sport', 'error');
    return;
  }
  sports = data.sports;
  render();
  showToast('Sport added successfully', 'success');
}

function selectedCenter(sportId){ return document.getElementById(`center-${sportId}`).value; }
function selectedGroup(sportId){ const i=document.getElementById(`group-${sportId}`); return i ? parseInt(i.value || '2') : 2; }

async function startMonitoring(sportId){
  const center = selectedCenter(sportId);
  const group_size = selectedGroup(sportId);
  const res = await fetch('/api/start',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({activity_type:sportId, center, group_size})
  });
  const data = await res.json();
  if(!data.success) { showToast(data.message || 'Start failed', 'error'); return; }
  document.getElementById(`status-${sportId}`).innerHTML = statusPill(`Monitoring (${center})`, 'status-active');
  showToast(`${sportId} monitoring started`, 'success');
}

async function stopMonitoring(sportId){
  const center = selectedCenter(sportId);
  const res = await fetch('/api/stop',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({activity_type:sportId, center})
  });
  const data = await res.json();
  if(!data.success) { showToast(data.message || 'Stop failed', 'error'); return; }
  document.getElementById(`status-${sportId}`).innerHTML = statusPill('Stopped', 'status-stop');
  showToast(`${sportId} monitoring stopped`, 'info');
}

function renderSlots(slots) {
  if (!slots || !slots.length) return '<span class="muted">No slots</span>';
  return `<div class="slots">${slots.map(s => `<div class='slot'>${s.full_datetime || `${s.date||''} ${s.time||''}`}</div>`).join('')}</div>`;
}

async function checkNow(sportId){
  const center = selectedCenter(sportId);
  const group_size = selectedGroup(sportId);
  const res = await fetch('/api/check-now',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({activity_type:sportId, center, group_size})
  });
  const data = await res.json();
  const detail = document.getElementById(`details-${sportId}`);
  if(!data.success) {
    detail.innerHTML = `<span class="muted">${data.message || 'Failed to check'}</span>`;
    showToast(data.message || 'Check failed', 'error');
    return;
  }
  const slots = data.slots || [];
  detail.innerHTML = renderSlots(slots);
  showToast(slots.length ? `Found ${slots.length} slot(s)` : 'No slots right now', slots.length ? 'success' : 'info');
}

async function updateStatus(){
  const res = await fetch('/api/status');
  if(res.status !== 200) return;
  const data = await res.json();
  Object.entries(data.processes || {}).forEach(([k,p]) => { monitoring[k] = p; });
  sports.forEach(s => {
    const center = selectedCenter(s.id);
    const st = monitoring[key(s.id, center)];
    if(!st) return;
    const statusCell = document.getElementById(`status-${s.id}`);
    const detail = document.getElementById(`details-${s.id}`);
    statusCell.innerHTML = st.active ? statusPill(`Monitoring (${center})`, 'status-active') : statusPill('Idle', 'status-idle');
    if (st.slots) detail.innerHTML = renderSlots(st.slots);
  });
  updateKpis();
}

loadConfig();
setInterval(updateStatus, 4000);
</script>
</body>
</html>
