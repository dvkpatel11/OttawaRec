<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Ottawa Rec Booking</title>
  <style>
    :root {
      --pl-purple: #37003c;
      --pl-purple-2: #5b0a67;
      --pl-pink: #ff2a6d;
      --pl-cyan: #00f0ff;
      --ink: #fff;
      --muted: #d8c6de;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(920px 520px at 15% -10%, rgba(0,240,255,.24), transparent 60%),
        radial-gradient(880px 550px at 90% 110%, rgba(255,42,109,.22), transparent 62%),
        linear-gradient(140deg, #220126, var(--pl-purple), var(--pl-purple-2));
      padding: 18px;
    }
    .card {
      width: min(430px, 100%);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(47, 9, 60, 0.8);
      box-shadow: 0 26px 64px rgba(9, 0, 18, .62);
      backdrop-filter: blur(10px);
      padding: 22px;
    }
    h1 {
      margin: 0;
      font-size: 1.45rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .6px;
      text-shadow: 0 0 20px rgba(0, 240, 255, .25);
    }
    p { margin: 7px 0 14px; color: var(--muted); font-size: .94rem; }
    label { display: block; margin: 8px 0 6px; font-size: .88rem; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; }
    input {
      width: 100%;
      border-radius: 11px;
      border: 1px solid rgba(255,255,255,.23);
      background: rgba(255,255,255,.11);
      color: #fff;
      padding: 12px;
      outline: none;
    }
    input::placeholder { color: rgba(255,255,255,.72); }
    button {
      width: 100%;
      margin-top: 14px;
      border: none;
      border-radius: 11px;
      padding: 12px;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(130deg, #6f2fff, var(--pl-pink));
      box-shadow: 0 12px 28px rgba(255,42,109,.3);
    }
    .error {
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 123, 160, 0.45);
      background: rgba(255, 64, 130, 0.2);
      color: #ffd7e5;
      font-size: .87rem;
      padding: 8px 10px;
    }
    .hint { margin-top: 9px; color: var(--muted); font-size: .8rem; }
  </style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <h1>Premier Login</h1>
    <p>Access your Ottawa Rec command center.</p>

    <label for="username">Username</label>
    <input id="username" name="username" placeholder="admin" required />

    <label for="password">Password</label>
    <input id="password" name="password" type="password" placeholder="••••••••" required />

    <button type="submit">Enter Dashboard</button>

    {% if request.args.get('error') %}
      <div class="error">Invalid credentials. Please try again.</div>
    {% endif %}

    <div class="hint">This deployment currently uses hardcoded credentials.</div>
  </form>
</body>
</html>
