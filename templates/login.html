<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Ottawa Rec</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0f172a; color:#e2e8f0; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .card { width:min(92vw,380px); background:#111827; padding:24px; border-radius:12px; border:1px solid #334155; }
    input, button { width:100%; padding:12px; margin-top:10px; border-radius:8px; border:1px solid #334155; }
    button { background:#2563eb; color:white; cursor:pointer; border:none; }
    .hint { color:#94a3b8; font-size:12px; margin-top:10px; }
    .error { color:#f87171; margin-top:8px; }
  </style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <h2>Ottawa Rec Login</h2>
    <input name="username" placeholder="Username" required />
    <input name="password" type="password" placeholder="Password" required />
    <button type="submit">Login</button>
    {% if request.args.get('error') %}<div class="error">Invalid credentials</div>{% endif %}
    <div class="hint">Hardcoded credentials are enabled for this deployment.</div>
  </form>
</body>
</html>
